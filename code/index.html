<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Game</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
</head>

<body>
    <div class="container">
        <h1>Chess Game</h1>

        <!-- Mode Selection Screen -->
        <div id="mode-screen">
            <p>Choose your game mode to start playing!</p>
            <div class="mode-buttons">
                <button class="mode-btn vs-computer">
                    <span>🤖</span>
                    vs Computer
                </button>
                <button class="mode-btn vs-friend">
                    <span>👥</span>
                    vs Friend
                </button>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen">
            <div id="board" class="board"></div>
            <div class="buttons">
                <button class="play-again">Play Again</button>
                <button class="set-pos">Set Position</button>
                <button class="flip-board">Flip Board</button>
                <button class="change-mode">Change Mode</button>
            </div>
            <div id="move-history" class="move-history"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://unpkg.com/chess.js@0.10.3/chess.js"></script>
    <script src="script.js"></script>
</body>

</html>
